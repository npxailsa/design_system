name: Chromatic

# IMPORTANT: Only trigger on `push`.
# TurboSnap is NOT compatible with `pull_request` (or its variations such as
# `pull_request_target`, `pull_request_review`, etc.).
#
# `pull_request` workflows run against an ephemeral merge commit that does not
# exist in Git history. Chromatic cannot locate earlier builds for that commit,
# so TurboSnap would compare against the wrong set of changed files —
# producing unpredictable snapshots and potential missed regressions.
#
# Ref: https://www.chromatic.com/docs/turbosnap/#github-pull_request-triggers
on:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          # Use the repository secret if set, otherwise fall back to the
          # project token. To rotate the token, add CHROMATIC_PROJECT_TOKEN
          # to your repository secrets (Settings → Secrets → Actions).
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN || 'chpt_44a4334f1199317' }}
          buildScriptName: build-storybook
          exitZeroOnChanges: true
          # TurboSnap: only snapshot stories affected by changed files.
          # Chromatic will automatically inject --stats-json into the
          # build-storybook command so it can trace the dependency graph.
          onlyChanged: true
          # Re-test all stories if files outside the Webpack/Vite graph change
          # (custom fonts live in public/typefaces and are not imported by JS).
          externals: |
            public/typefaces/**
          # Ignore package control file changes — prevents a full re-test
          # every time a dependency version is bumped.
          # NOTE: disable TurboSnap on main if you need a safety net for
          # dependency-driven visual regressions.
          untraced: |
            package.json
            package-lock.json
