name: CI / Publish to GitHub Packages

on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual runs from the GitHub Actions UI

jobs:
  # ─── Job 1: Quality Checks ──────────────────────────────────────────────────
  ci:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@npxailsa'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build library
        run: npm run build:lib

  # ─── Job 2: Publish (only runs if CI passes) ────────────────────────────────
  publish:
    name: Publish to GitHub Packages
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      contents: write   # push the version-bump commit and tag back to main
      packages: write   # publish to GitHub Packages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so npm version can create a proper tag
          fetch-depth: 0
          # Use the built-in GITHUB_TOKEN so git push has the right auth
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js with GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@npxailsa'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build library
        run: npm run build:lib

      - name: Configure git for version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        # Increments patch (e.g. 1.0.0 → 1.0.1) and creates a git tag.
        # [skip ci] prevents this commit from re-triggering the workflow.
        run: |
          npm version patch -m "chore: release v%s [skip ci]"

      - name: Publish package to GitHub Packages
        # GITHUB_TOKEN cannot write to GitHub Packages — a PAT with
        # write:packages scope is required for npm publish.
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SYNC_PAT }}

      - name: Push version commit and tag to main
        run: git push --follow-tags
