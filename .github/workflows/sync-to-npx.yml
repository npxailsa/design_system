name: Sync to NPXInnovation/design_system

# Triggers automatically on every push to main, or manually from the Actions tab
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: 'Force push (overwrites NPX history — use with care)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  sync:
    name: Mirror main → NPXInnovation/design_system
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add NPXInnovation remote
        run: |
          git remote add npx https://x-access-token:${{ secrets.NPX_SYNC_PAT }}@github.com/NPXInnovation/design_system.git

      - name: Fetch NPXInnovation remote
        run: git fetch npx

      - name: Check divergence
        id: diff
        run: |
          # Check if NPX main exists
          if git ls-remote --exit-code npx main >/dev/null 2>&1; then
            AHEAD=$(git rev-list --count npx/main..HEAD)
            BEHIND=$(git rev-list --count HEAD..npx/main)
            echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
            echo "behind=$BEHIND" >> $GITHUB_OUTPUT
            echo "npx_exists=true" >> $GITHUB_OUTPUT
            echo "NPX main is $BEHIND commits ahead of this repo; this repo is $AHEAD commits ahead of NPX main"
          else
            echo "npx_exists=false" >> $GITHUB_OUTPUT
            echo "ahead=1" >> $GITHUB_OUTPUT
            echo "behind=0" >> $GITHUB_OUTPUT
            echo "NPX main branch does not exist yet — will create it"
          fi

      - name: Merge NPX changes (if any)
        if: steps.diff.outputs.npx_exists == 'true' && steps.diff.outputs.behind != '0'
        run: |
          echo "NPX has ${{ steps.diff.outputs.behind }} commits not in this repo — merging with ours strategy for auto-generated/config files..."
          git merge npx/main \
            --no-edit \
            --strategy-option=ours \
            -m "chore: merge NPXInnovation/design_system into sync baseline [skip ci]" \
            || (echo "Merge conflict — resolve manually and re-run" && exit 1)

      - name: Push to NPXInnovation
        if: steps.diff.outputs.ahead != '0' || steps.diff.outputs.npx_exists == 'false'
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          git push npx HEAD:main $FORCE_FLAG
          echo "✅ Successfully pushed to NPXInnovation/design_system:main"

      - name: Nothing to sync
        if: steps.diff.outputs.ahead == '0' && steps.diff.outputs.npx_exists == 'true'
        run: echo "✅ NPXInnovation/design_system is already up to date."
