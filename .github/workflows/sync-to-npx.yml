name: Sync to NPXInnovation/design_system

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: 'Force push (overwrites NPX history — use with care)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  sync:
    name: Mirror main → NPXInnovation/design_system
    runs-on: ubuntu-latest

    steps:
      - name: Verify SYNC_PAT is configured
        run: |
          if [ -z "${{ secrets.SYNC_PAT }}" ]; then
            echo "❌ SYNC_PAT secret is not set or is empty."
            echo ""
            echo "To fix this:"
            echo "  1. Go to https://github.com/npxailsa/design_system/settings/secrets/actions"
            echo "  2. Click 'New repository secret'"
            echo "  3. Name: SYNC_PAT"
            echo "  4. Value: a PAT with 'repo' scope that has access to NPXInnovation/design_system"
            exit 1
          fi
          echo "✅ SYNC_PAT is configured"

      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add NPXInnovation remote
        run: |
          git remote add npx https://oauth2:${{ secrets.SYNC_PAT }}@github.com/NPXInnovation/design_system.git

      - name: Verify access to NPXInnovation/design_system
        run: |
          if ! git ls-remote npx HEAD > /dev/null 2>&1; then
            echo "❌ Cannot access NPXInnovation/design_system."
            echo ""
            echo "Possible causes:"
            echo "  • The SYNC_PAT token has expired"
            echo "  • The token lacks 'repo' scope"
            echo "  • The token owner does not have write access to NPXInnovation/design_system"
            exit 1
          fi
          echo "✅ Successfully connected to NPXInnovation/design_system"

      - name: Check if push is needed
        id: diff
        run: |
          NPX_SHA=$(git ls-remote npx refs/heads/main | cut -f1)
          LOCAL_SHA=$(git rev-parse HEAD)

          if [ "$NPX_SHA" = "$LOCAL_SHA" ]; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
            echo "✅ NPXInnovation/design_system is already up to date (SHA: $LOCAL_SHA)"
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
            echo "🔄 Push needed — local: $LOCAL_SHA | npx: ${NPX_SHA:-'(empty)'}"
          fi

      - name: Push to NPXInnovation
        if: steps.diff.outputs.up_to_date != 'true'
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
            echo "⚠️  Force push enabled"
          fi
          git push npx HEAD:main $FORCE_FLAG
          echo "✅ Successfully pushed to NPXInnovation/design_system:main"

      - name: Nothing to sync
        if: steps.diff.outputs.up_to_date == 'true'
        run: echo "✅ Already in sync — nothing to do."
