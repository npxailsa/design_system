<script>
  // Patch ResizeObserver in the manager frame so callbacks are deferred via
  // requestAnimationFrame. This prevents "ResizeObserver loop completed with
  // undelivered notifications" from being thrown in the first place.
  (function () {
    if (typeof window === 'undefined' || typeof window.ResizeObserver === 'undefined') return;

    var OriginalRO = window.ResizeObserver;
    window.ResizeObserver = function PatchedResizeObserver(callback) {
      return new OriginalRO(function (entries, observer) {
        window.requestAnimationFrame(function () {
          if (!Array.isArray(entries) || !entries.length) return;
          callback(entries, observer);
        });
      });
    };
    window.ResizeObserver.prototype = OriginalRO.prototype;

    // Also suppress via error event in capture phase.
    window.addEventListener('error', function (e) {
      if (
        e.message &&
        (e.message.indexOf('ResizeObserver loop completed') !== -1 ||
          e.message.indexOf('ResizeObserver loop limit exceeded') !== -1)
      ) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    }, true);

    // Suppress window.onerror path.
    var origOnError = window.onerror;
    window.onerror = function (message) {
      if (
        typeof message === 'string' &&
        (message.indexOf('ResizeObserver loop completed') !== -1 ||
          message.indexOf('ResizeObserver loop limit exceeded') !== -1)
      ) {
        return true;
      }
      if (typeof origOnError === 'function') {
        return origOnError.apply(this, arguments);
      }
      return false;
    };
  })();
</script>
